function extractJSON(raw) {
  if (!raw || typeof raw !== "string") throw new Error("Empty response from AI");
  let text = raw.trim();

  // Strip <thinking>...</thinking> blocks (and any other XML-like wrapper tags)
  text = text.replace(/<thinking>[\s\S]*?<\/thinking>/gi, "").trim();
  text = text.replace(/<[a-z_][a-z0-9_-]*>[\s\S]*?<\/[a-z_][a-z0-9_-]*>/gi, "").trim();

  // Strip markdown fences
  text = text.replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```\s*$/g, "").trim();

  // Try direct parse first
  try { return JSON.parse(text); } catch {}

  // Extract outermost JSON object — walk from first { to its matching }
  const objStart = text.indexOf("{");
  if (objStart !== -1) {
    let depth = 0;
    for (let i = objStart; i < text.length; i++) {
      if (text[i] === "{") depth++;
      else if (text[i] === "}") {
        depth--;
        if (depth === 0) {
          try { return JSON.parse(text.slice(objStart, i + 1)); } catch {}
          break;
        }
      }
    }
  }

  // Fallback: last-resort slice between outermost { }
  const start = text.indexOf("{");
  const end = text.lastIndexOf("}");
  if (start !== -1 && end !== -1 && end > start) {
    try { return JSON.parse(text.slice(start, end + 1)); } catch {}
  }

  throw new Error("Could not parse AI response as JSON. Please try again.");
}

async function callAPI(system, user) {
  const r = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system, user, model: "gemini-2.5-flash" })
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error || `API error ${r.status}`);
  }
  const d = await r.json();
  return extractJSON(d.text || "");
}

function calcCost(result, answers, questions) {
  // Determine payload size from clarifying answers
  const pq = questions.find(q => /page|size|document|long/i.test(q.question));
  const pAns = pq ? (Array.isArray(answers[pq.id]) ? answers[pq.id][0] : answers[pq.id]) : null;
  const payload = PAYLOAD[pAns] || PAYLOAD["Medium (5–20 pages)"];

  // Monthly run count and label per execution approach
  const runsMap = {
    "Direct LLM Usage":          { count: 1,   label: "1 run (one-time)" },
    "LLM Skill / Prompt Template":{ count: 30,  label: "~30 runs/mo" },
    "Scheduled Automation":       { count: 100, label: "~100 runs/mo" },
    "Full Autonomous Agent":      { count: 300, label: "~300 runs/mo" },
  };
  const runInfo = runsMap[result?.executionApproach] || { count: 100, label: "~100 runs/mo" };
  const monthlyRuns = runInfo.count;

  // Per-LLM cost breakdown across all tasks
  const perLLM = {};
  (result?.llmDistribution || []).forEach(d => {
    const info = LLMDATA[d.llm];
    if (!info) return;
    const taskShare = (d.taskCount || 1) / Math.max((result?.tasks?.length || 1), 1);
    const singleUSD = ((payload.in / 1e6) * info.in + (payload.out / 1e6) * info.out) * taskShare;
    perLLM[d.llm] = {
      singleUSD,
      monthlyUSD: singleUSD * monthlyRuns,
      taskCount: d.taskCount,
      taskNames: d.taskNames || [],
    };
  });

  // Primary LLM fallback
  const primaryInfo = LLMDATA[result?.primaryLLM];
  if (!primaryInfo) return null;

  const singleRunUSD = Object.values(perLLM).reduce((s, v) => s + v.singleUSD, 0)
    || ((payload.in / 1e6) * primaryInfo.in + (payload.out / 1e6) * primaryInfo.out);

  const monthlyUSD = singleRunUSD * monthlyRuns;

  return {
    usd: monthlyUSD,
    inr: monthlyUSD * USD,
    runs: monthlyRuns,
    runsLabel: runInfo.label,
    buf: 1.0,
    singleRunUSD,
    singleRunINR: singleRunUSD * USD,
    perLLM,
    payload: pAns || "Medium (5–20 pages)",
  };
}

function toggleAns(qId, opt, isMulti, max) {
  const prev = { ...state.answers };
  if (!isMulti) { prev[qId] = opt; }
  else {
    const cur = Array.isArray(prev[qId]) ? prev[qId] : [];
    if (cur.includes(opt)) prev[qId] = cur.filter(o => o !== opt);
    else prev[qId] = [...cur, opt];
  }
  setState({ answers: prev });
}

function isSel(qId, opt, isMulti) {
  return isMulti ? (Array.isArray(state.answers[qId]) && state.answers[qId].includes(opt)) : state.answers[qId] === opt;

async function handleIntake() {
  const i = state.intake;
  if (!i.userType || !i.useCase?.trim() || !i.usageIntent || !i.execPref) {
    setState({ error: "Please complete all required fields." }); return;
  }
  setState({ error: "", loadStage: "clarify" });
  try {
    const prompt = CLARIFY.replace("INTAKE_DATA", JSON.stringify(i));
    const data = await callAPI("Return only valid JSON. No markdown.", prompt);
    const qs = data.questions || [];
    const init = {};
    qs.forEach(q => { init[q.id] = q.multiSelect ? [] : ""; });
    setState({ questions: qs, answers: init, screen: "questions", loadStage: null });
  } catch (e) { setState({ error: "Error: " + e.message, loadStage: null }); }
}

async function handleGenerate(isRefine) {
  setState({ error: "", loadStage: "generate" });
  try {
    const fmtA = {};
    Object.entries(state.answers).forEach(([k, v]) => { fmtA[k] = Array.isArray(v) ? v.join(", ") : v; });
    const payload = { intake: state.intake, clarifyingAnswers: fmtA, questions: state.questions };
    if (isRefine && state.refinement?.trim()) payload.refinementNote = state.refinement;
    if (isRefine && state.result) payload.previousAnalysis = { title: state.result.title };
    const data = await callAPI(SYSPROMPT, JSON.stringify(payload));
    setState({ result: data, screen: "result", loadStage: null, refinement: "", resultTab: "summary", activeFlowNode: null });
  } catch (e) { setState({ error: "Error: " + e.message, loadStage: null }); }
}

async function shareBlueprint() {
  if (!state.result) return;
  // If already shared, just copy the existing URL
  if (state.shareId) {
    const url = `${location.origin}/?id=${state.shareId}`;
    navigator.clipboard.writeText(url).then(() => {
      setState({ shareFlash: true });
      setTimeout(() => setState({ shareFlash: false }), 2500);
    });
    return;
  }
  setState({ loadStage: "share" });
  try {
    const r = await fetch("/api/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ result: state.result, intake: state.intake }),
    });
    if (!r.ok) throw new Error(`Save failed: ${r.status}`);
    const { id } = await r.json();
    const url = `${location.origin}/?id=${id}`;
    await navigator.clipboard.writeText(url).catch(() => {});
    setState({ shareId: id, shareFlash: true, loadStage: null });
    // Update browser URL bar without a page reload
    history.replaceState(null, "", `/?id=${id}`);
    setTimeout(() => setState({ shareFlash: false }), 2500);
  } catch (e) {
    setState({ error: "Share failed: " + e.message, loadStage: null });
  }
}

      </div>
      ${isMulti && curArr.length > 0 ? `<p style="margin-top:7px;font-size:12px;color:var(--pr-tx)">Selected: ${curArr.join(" · ")}</p>` : ""}
    </div>`;
  }).join("");
  return `<div class="fu">
    <div style="margin-bottom:20px">
      <div style="display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap">

    </div>
    ${state.error ? `<div style="background:var(--er-bg);border:1px solid var(--er);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--er-tx)">${state.error}</div>` : ""}
    ${qHtml}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn-s" onclick="setState({screen:'intake'})">← Back</button>
      <button class="btn-p" onclick="handleGenerate(false)" style="flex:1">Generate my blueprint →</button>
    </div>
  </div>`;
}

function encodePrompt(s) {
  // Safe HTML-attribute encoding — no regex literals near template literal boundaries
  if (!s) return "";
  let out = "";
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (c === '"')       out += "&quot;";
    else if (c === "\n") out += "&#10;";
    else if (c === "\r") out += "&#13;";
    else                  out += c;
  }
  return out;
}

  const tabArchitectureContent = `<div class="fu">${flowHtml}${taskBreakdown}${toolAnalysis}</div>`;

  // ── Tab 3: Step-by-Step Guide ────────────────────────────────────────────
  const stepsContent = r.detailedSteps?.length > 0 ? `<div class="fu">
    <p style="font-size:13px;color:var(--txt2);margin-bottom:14px;line-height:1.5">Written for beginners. No prior experience needed.</p>
    ${r.detailedSteps.map(step => `
      <div class="step-card">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
          <div style="width:24px;height:24px;border-radius:6px;background:var(--pr-bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--pr-tx);flex-shrink:0">S${step.taskNumber}</div>
          <div>
            <p style="margin:0;font-size:13px;font-weight:600;color:var(--txt)">${step.taskName}</p>
            <p style="margin:0;font-size:11px;color:var(--txt3)">⏱ ${step.setupTime}</p>
          </div>
        </div>
        <p style="font-size:13px;color:var(--txt2);line-height:1.55;margin-bottom:10px">${step.description}</p>
        ${step.promptTemplate ? `<div style="background:var(--bg3);border-radius:var(--r);padding:10px 13px;margin-bottom:10px">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px">
            <p style="margin:0;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em">Prompt to use</p>
            <button class="copy-btn" data-copy-idx="${step.taskNumber}" data-prompt="${encodePrompt(step.promptTemplate)}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy
            </button>
          </div>
          <p style="margin:0;font-size:12px;color:var(--pr-tx);font-family:monospace;line-height:1.55;white-space:pre-wrap">${step.promptTemplate}</p>
        </div>` : ""}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px">
          <div style="background:var(--bg2);border-radius:var(--r);padding:8px 10px"><p style="margin:0 0 2px;font-size:10px;color:var(--txt3);text-transform:uppercase">Input</p><p style="margin:0;font-size:12px;color:var(--txt2)">${step.input}</p></div>
          <div style="background:var(--bg2);border-radius:var(--r);padding:8px 10px"><p style="margin:0 0 2px;font-size:10px;color:var(--txt3);text-transform:uppercase">Output</p><p style="margin:0;font-size:12px;color:var(--txt2)">${step.output}</p></div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${step.platform?`<span class="pill" style="background:var(--bg2);color:var(--txt2);font-size:11px">🔧 ${step.platform}</span>`:""}
          ${step.llm&&step.llm!=="None"?`<span class="pill" style="background:var(--bg2);color:var(--txt2);font-size:11px">🤖 ${step.llm}</span>`:""}
          ${step.isUxSuggestion?`<span class="ux-badge">💡 AI UX Suggestion</span>`:""}
        </div>
        ${step.connection?`<p style="margin:8px 0 0;font-size:11px;color:var(--txt3)">→ ${step.connection}</p>`:""}
      </div>`).join("")}
  </div>` : `<div class="card"><p style="font-size:13px;color:var(--txt2)">Step-by-step guide not available for this blueprint.</p></div>`;

  const tabGuideContent = `<div class="fu">${stepsContent}${disclaimer}</div>`;

  // ── Tab bar ──────────────────────────────────────────────────────────────
  const tabBar = `<div class="tab-bar no-print" role="tablist">
    <button class="tab-btn ${tab==="summary"?"active":""}" role="tab" aria-selected="${tab==="summary"}" data-tab="summary" onclick="setState({resultTab:'summary'})">📊 Summary & ROI</button>
    <button class="tab-btn ${tab==="architecture"?"active":""}" role="tab" aria-selected="${tab==="architecture"}" data-tab="architecture" onclick="setState({resultTab:'architecture'})">⚙ Workflow Architecture</button>
    <button class="tab-btn ${tab==="guide"?"active":""}" role="tab" aria-selected="${tab==="guide"}" data-tab="guide" onclick="setState({resultTab:'guide'})">📋 Step-by-Step Guide</button>
  </div>`;

  const tabContent = tab === "summary" ? tabSummaryContent
    : tab === "architecture" ? tabArchitectureContent
    : tabGuideContent;

  // ── Always-visible refinement box ────────────────────────────────────────
  const refinementBox = state.isReadOnly ? "" : `<div class="card no-print" style="border:1px solid var(--bdr2)" id="refinement-section">
    <span class="lbl" style="color:var(--pr-tx)">🔁 Refine your blueprint</span>
    <p style="font-size:13px;color:var(--txt2);margin-bottom:10px;line-height:1.45">Add new context, correct something, or change your requirements — the entire blueprint will be regenerated.</p>
    <textarea class="inp" rows="3" style="resize:vertical;margin-bottom:10px" placeholder="e.g. I forgot to mention I use HubSpot as my CRM. Also, my company won't allow connecting Slack to external AI tools." id="refineArea">${state.refinement||""}</textarea>
    <div style="display:flex;gap:8px">
      <button class="btn-p" id="refineBtn" onclick="doRefine()" ${!state.refinement?.trim() ? "disabled" : ""} style="flex:1">Re-analyse with update →</button>
      <button class="btn-s" onclick="startFresh()">↺ Start over</button>
    </div>
  </div>`;

  // FAB removed — refinement box is inline under hero

  return `<div class="fu">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;flex-wrap:wrap" class="no-print">
      <div></div>
      <button class="btn-s" style="font-size:12px;padding:7px 12px" onclick="window.print()">🖨 Print / Save PDF</button>
    </div>
    ${executiveSummary}
    ${refinementBox}
    ${cliffWarn}
    ${tabBar}
    ${tabContent}
    ${refinementBox}
    <p style="text-align:center;font-size:11px;color:var(--txt3);margin-top:12px" class="no-print">Session auto-saved · Use the Save button in the header anytime</p>
  </div>`;
}

function render() {
  const app = document.getElementById("app");
  if (!app) return;

  // Clear any running tip carousel before every render
  if (window._tipInterval) { clearInterval(window._tipInterval); window._tipInterval = null; }

  if (state.loadStage) {
    const loadingContent = state.loadStage === "share"
      ? `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;text-align:center">
           <div class="spin-el"></div>
           <p style="font-size:15px;font-weight:500;color:var(--txt)">${state.isReadOnly ? "Loading shared blueprint…" : "Saving your blueprint…"}</p>
         </div>`
      : renderLoading(state.loadStage);
    app.innerHTML = renderHeader() + `<div style="max-width:680px;margin:0 auto;padding:20px">${loadingContent}</div>` + renderFooter();
    // Start rotating tips only during the longer generate stage
    if (state.loadStage === "generate") {
      let tipIdx = TIPS.findIndex(t => document.getElementById("loading-tip")?.textContent === t);
      if (tipIdx < 0) tipIdx = 0;
      window._tipInterval = setInterval(() => {
        const el = document.getElementById("loading-tip");
        if (!el) { clearInterval(window._tipInterval); window._tipInterval = null; return; }
        tipIdx = (tipIdx + 1) % TIPS.length;
        el.textContent = TIPS[tipIdx];
        el.classList.remove("tip-text");
        void el.offsetWidth; // force reflow to restart animation
        el.classList.add("tip-text");
      }, 6500);
    }
    return;
  }

  const maxW = (state.result && state.screen === "result") ? "980px" : "660px";
  let content = "";
  if (state.screen === "intake") content = renderIntake();
  else if (state.screen === "questions") content = renderQuestions();
  else if (state.screen === "result" && state.result) content = renderResult();

  app.innerHTML = renderHeader() + `<div style="max-width:${maxW};margin:0 auto;padding:28px 20px">${content}</div>` + renderFooter();

  document.querySelectorAll("[data-qid]").forEach(el => {
    el.addEventListener("click", () => {
      const qId = parseInt(el.dataset.qid);
      const opt = el.dataset.opt;
      const isMulti = el.dataset.multi === "true";
      const max = parseInt(el.dataset.max) || 3;
      const curArr = isMulti ? (Array.isArray(state.answers[qId]) ? state.answers[qId] : []) : [];
      const sel = isMulti ? curArr.includes(opt) : false;
      const disabled = isMulti && curArr.length >= max && !sel;
      if (!disabled) toggleAns(qId, opt, isMulti, max);
    });
  });

  document.querySelectorAll("[data-qid-other]").forEach(el => {
    el.addEventListener("input", () => {
      const qId = parseInt(el.dataset.qidOther);
      const isMulti = el.dataset.multi === "true";
      const val = el.value.trim();
      const prev = { ...state.answers };
      if (isMulti) {
        const cur = Array.isArray(prev[qId]) ? prev[qId] : [];
        const withoutOther = cur.filter(x => !x.startsWith("Other:"));
        prev[qId] = val ? [...withoutOther, `Other: ${val}`] : withoutOther;
      } else {
        prev[qId] = val ? `Other: ${val}` : "";
      }
      state.answers = prev;
    });
  });

  // Copy-prompt buttons — per-block state, no global re-render needed
  document.querySelectorAll("[data-copy-idx]").forEach(btn => {
    btn.addEventListener("click", () => {
      const raw = btn.dataset.prompt
        .replace(/&quot;/g, '"')
        .replace(/&#10;/g, "\n");
      navigator.clipboard.writeText(raw).then(() => {
        btn.classList.add("copied");
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove("copied");
          btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
        }, 2000);
      }).catch(() => {
        // Clipboard API unavailable — fallback selection
        const range = document.createRange();
        const pre = btn.closest("div").querySelector("p[style*='monospace']");
        if (pre) { range.selectNodeContents(pre); window.getSelection().removeAllRanges(); window.getSelection().addRange(range); }
      });
    });
  });

  const refineArea = document.getElementById("refineArea");
  const refineBtn = document.getElementById("refineBtn");
  if (refineArea) {
    refineArea.oninput = e => {
      state.refinement = e.target.value;
      if (refineBtn) refineBtn.disabled = !e.target.value.trim();
    };
  }
}

function renderFooter() {
  return `<footer style="border-top:1px solid var(--bdr);padding:14px 24px;text-align:center;margin-top:20px" class="no-print">
    <p style="font-size:11px;color:var(--txt3)">Blueprint · AI Workflow Designer · Built by Aditya · AI Upskilling Sprint Week 1 · Powered by Gemini · April 2026</p>
  </footer>`;
}

window.setIntake = (k, v) => setState({ intake: { ...state.intake, [k]: v } });
window.setSilentIntake = (k, v) => { state.intake = { ...state.intake, [k]: v }; };
window.setState = setState;
window.handleIntake = handleIntake;
window.handleGenerate = handleGenerate;
window.doRefine = () => { state.refinement = document.getElementById("refineArea")?.value || ""; handleGenerate(true); };
window.startFresh = startFresh;
window.manualSave = manualSave;
window.toggleTheme = toggleTheme;
window.resumeSession = () => {
  const s = loadState();
  if (s) setState({ ...s, loadStage: null, error: "", saveFlash: false });
};
window.dismissSaved = () => { clearState(); render(); };
window.shareBlueprint = shareBlueprint;
window.toggleFlowNode = (num) => setState({ activeFlowNode: state.activeFlowNode === num ? null : num });
window.scrollToRefine = () => {
  const section = document.getElementById("refinement-section");
  const area = document.getElementById("refineArea");
  if (section) section.scrollIntoView({ behavior: "smooth", block: "center" });
  if (area) setTimeout(() => area.focus(), 300);
};

// ── Permalink boot-loader ─────────────────────────────────────────────────
// Runs once on page load. If ?id=xyz is in the URL, fetch and display that
// shared blueprint as a read-only view. Otherwise normal boot.
(async function bootRouter() {
  const params = new URLSearchParams(location.search);
  const id = params.get("id");

  if (id && /^[0-9a-f-]+$/i.test(id) && id.length <= 36) {
    // Show loading immediately
    state.loadStage = "share";
    render();
    try {
      const r = await fetch(`/api/load?id=${encodeURIComponent(id)}`);
      if (!r.ok) throw new Error(r.status === 404 ? "Blueprint not found or expired." : `Load error ${r.status}`);
      const payload = await r.json();
      state = {
        ...state,
        screen: "result",
        result: payload.result,
        shareId: id,
        isReadOnly: true,
        loadStage: null,
        resultTab: "summary",
      };
      render();
    } catch (e) {
      state.loadStage = null;
      state.error = e.message;
      render();
    }
  } else {
    render();
  }
})();
</script>
</body>
</html>
