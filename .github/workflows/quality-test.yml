name: Blueprint — Quality Test Suite

on:
  schedule:
    # Runs on the 1st and 15th of every month at 9:00 AM UTC
    - cron: "0 9 1,15 * *"
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  quality-test:
    name: E2E Quality Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: tests
        run: npm install

      - name: Install Playwright browsers (Chromium only for free runner)
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run E2E test suite
        working-directory: tests
        run: npx playwright test --project="Desktop Chrome"
        continue-on-error: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: tests/playwright-report/
          retention-days: 30

      - name: Upload test results JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: tests/test-results/
          retention-days: 30

      - name: Check test outcome and notify
        working-directory: tests
        run: |
          if [ -f "test-results/results.json" ]; then
            FAILED=$(node -e "
              const r = require('./test-results/results.json');
              const failed = r.suites.flatMap(s => s.suites || []).flatMap(s => s.specs || []).filter(sp => sp.tests?.some(t => t.status === 'failed'));
              console.log(failed.length);
            " 2>/dev/null || echo "0")
            echo "Failed tests: $FAILED"
            if [ "$FAILED" != "0" ]; then
              echo "::warning::$FAILED test(s) failed. Download the playwright-report artifact to view details."
            else
              echo "All tests passed."
            fi
          fi
